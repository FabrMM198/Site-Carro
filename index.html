<!DOCTYPE html> <!--Versão do html-->
<html lang="pt-BR"> <!--Língua do site-->

<ul> <!--Lista - Menu de navegação do site-->
    <li></li> <!--Itens da lista-->
</ul>

<head> <!--Configurações do site-->
    <meta charset="UTF-8"> <!--Padrão de caracteres do site-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Site compatível com celular e computador-->
    <link rel="stylesheet" href="./style.css"> <!--Importando/ link do arquivo CSS-->
    <title>Site - Carros</title> <!--Título do site-->
</head>

<body>
    <img src="./img/LOGO.png" alt="Logo da FIAT" class="logo"> <!--Logo da FIAT-->

    <ul class="lista">
    
    <!--Item 1-->
    <li class="item"> <!--Caixa = Divisão do site-->

        <video src="./img/FIAT MOBI VIDEO VENDA.mp4" autoplay loop muted></video>

        <div class="info-carro">
            <h1>FIAT MOBI</h1> <!--Título-->
            <p>Parcela a partir de R$ 1.950,00</p>
        </div>

        <div class="rodape">
            <button onclick="abrirFormulario()" class="comprar-agora">Comprar agora</button>
            <button onclick="abrirFormularioTeste()" class="faça-test-drive">Faça um test drive</button>
            <button onclick="abrirsaibamais()" class="saiba-mais">Saiba mais</button>
            <p>Não garantimos seu veículo imediatamente. Consultar estoque.*</p>
        </div>
    </li>
    
    <!--Item 2-->
    <li class="item"> <!--Caixa = Divisão do site-->

        <img class="img-fiat-red" src="./img/FIAT MOBI RED.png" alt="Imagem do carro FIAT MOBI red"> <!--Imagem do carro-->

        <div class="info-carro">
            <h1>O CARRO DO ANO</h1> <!--Título-->
            <p>Compre agora o seu FIAT MOBI!</p>
        </div>
    </li>

    <!--Item 3-->
    <li class="item"> <!--Caixa = Divisão do site-->

        <video src="./img/FIAT MOBI VIDEO TESTE.mp4" autoplay loop muted></video>

        <div class="info-carro">
            <h1 class="texto-menu-3">ATENDIMENTO DE QUALIDADE</h1> <!--Título-->
            <p class="texto-menu-3">Agende um teste drive na concessionária mais próxima.</p>
        </div>
    </li>
    </ul>

<div class="formulario">

    <script type="text/javascript" src="https://form.jotform.com/jsform/261754166275059"></script> <!--Formulário de contato-->
    <span class="fechar-formulario" onclick="fecharFormulario()">Fechar</span> <!--Botão para fechar o formulário-->
</div>

<div class="formulario-teste">
    
    <script type="text/javascript" src="https://form.jotform.com/jsform/261756839952676"></script> <!--Formulário de contato-->
    <span class="fechar-formulario" onclick="fecharFormularioTeste()">Fechar</span> <!--Botão para fechar o formulário-->
</div>

<div class="formulario-saibamais">
    
    <img src="./img/saiba mais.png" alt="Saiba mais" class="img-saiba-mais"> <!--Imagem do saiba mais-->
    <span class="fechar-formulario" onclick="fecharsaibamais()">Fechar</span> <!--Botão para fechar o formulário-->

</body>

<script src="scripts.js"></script> <!--Importando/ link do arquivo JS-->

</html>
